<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>📊 مقارنة التقارير</title>

<style>
:root{
  --gold:#e0ca51;
  --bg:#222;
  --panel-bg:rgba(0,0,0,0.85);
  --line:rgba(224,202,81,0.20);
  --ok:#65d46e;
  --warn:#ff7b7b;
  --note:#6db7ff;
  --orange:#ffb347;
}

html,body{height:100%}
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  color:var(--gold);
  text-align:center;
  direction:rtl;
  background-color:#111;
  background-image:url("https://raw.githubusercontent.com/xhhp1/SOMTINGHNEW/main/pic.png");
  background-repeat:no-repeat;
  background-position:center center;
  background-size:cover;
  background-attachment:fixed;
}

.app{
  min-height:100vh;
  padding:32px 18px;
  backdrop-filter:blur(4px);
  background:rgba(0,0,0,0.30);
}

.container{
  width:min(1180px, 100%);
  margin:0 auto;
  background:var(--panel-bg);
  border:1px solid rgba(224,202,81,0.18);
  border-radius:24px;
  box-shadow:0 18px 45px rgba(0,0,0,0.45);
  padding:28px;
}

h1{
  margin:0 0 10px;
  font-size:30px;
  color:var(--gold);
  text-shadow:0 2px 10px rgba(0,0,0,0.45);
}

.sub{
  margin:0 0 26px;
  color:#f2e7a3;
  font-size:15px;
  opacity:.95;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}

.card{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 28px rgba(0,0,0,0.25);
}

label{
  display:block;
  text-align:right;
  margin:0 0 10px;
  font-size:16px;
  font-weight:700;
  color:var(--gold);
}

textarea{
  width:100%;
  min-height:300px;
  resize:vertical;
  border:none;
  outline:none;
  border-radius:14px;
  padding:14px;
  font-family:Tahoma, Arial, sans-serif;
  font-size:15px;
  line-height:1.8;
  color:var(--gold);
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(224,202,81,0.18);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
}

textarea::placeholder{
  color:#d9cb84;
  opacity:.75;
}

.actions{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin:8px 0 22px;
}

button{
  border:none;
  cursor:pointer;
  border-radius:14px;
  padding:13px 22px;
  font-family:Tahoma, Arial, sans-serif;
  font-size:15px;
  font-weight:700;
  transition:.18s ease;
}

button:hover{
  transform:translateY(-2px);
}

.main-btn{
  background:linear-gradient(180deg, #ecd96f 0%, #d2b93f 100%);
  color:#1b1b1b;
  box-shadow:0 10px 24px rgba(224,202,81,0.22);
}

.clear-btn{
  background:rgba(255,255,255,0.05);
  color:var(--gold);
  border:1px solid rgba(224,202,81,0.25);
}

.results-wrap{
  text-align:right;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
}

.results-title{
  margin:0 0 14px;
  font-size:22px;
  text-align:center;
}

.result-box{
  background:rgba(0,0,0,0.36);
  border:1px solid rgba(224,202,81,0.13);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.result-box:last-child{
  margin-bottom:0;
}

.result-box h3{
  margin:0 0 10px;
  font-size:17px;
}

.result-box .empty{
  opacity:.8;
}

.result-box ul{
  margin:0;
  padding-right:18px;
}

.result-box li{
  margin:8px 0;
  word-break:break-word;
  line-height:1.8;
}

.shared h3{color:var(--ok)}
.only-supervisor h3{color:var(--warn)}
.only-technical h3{color:var(--orange)}
.duplicate h3{color:var(--note)}
.time-box h3{color:#9ee37d}
.invalid h3{color:#ff8c69}

.time-good{
  color:var(--ok);
  font-weight:700;
}

.time-bad{
  color:var(--warn);
  font-weight:700;
}

.time-info{
  color:#f5e79c;
}

.copy-btn{
  margin-top:12px;
  width:100%;
  background:rgba(224,202,81,0.10);
  color:var(--gold);
  border:1px solid rgba(224,202,81,0.22);
}

.footer-note{
  margin-top:14px;
  font-size:13px;
  color:#e9db90;
  opacity:.85;
}

.code-like{
  background:rgba(255,255,255,0.06);
  padding:2px 8px;
  border-radius:8px;
  display:inline-block;
  margin:2px 0;
}

.place{
  color:#9fd3ff;
  font-weight:700;
}

.badge{
  display:inline-block;
  margin:2px 0 0;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(224,202,81,0.18);
  color:#f4e8a4;
  font-size:13px;
}

@media (max-width: 800px){
  .grid{
    grid-template-columns:1fr;
  }

  .container{
    padding:18px;
  }

  textarea{
    min-height:220px;
  }

  h1{
    font-size:24px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="container">
    <h1>📊 مقارنة التقارير</h1>
    <p class="sub">يقارن المنشنات والأكواد، ويحدد مكان التكرار أو النقص أو الخطأ بالتفصيل.</p>

    <div class="grid">
      <div class="card">
        <label for="supervisorText">تقرير المشرف</label>
        <textarea id="supervisorText" placeholder="ألصق هنا تقرير المشرف..."></textarea>
      </div>

      <div class="card">
        <label for="technicalText">تقرير الفني</label>
        <textarea id="technicalText" placeholder="ألصق هنا تقرير الفني..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="main-btn" onclick="compareReports()">🚀 مقارنة الآن</button>
      <button class="clear-btn" onclick="clearAllFields()">🗑️ مسح الكل</button>
    </div>

    <div class="results-wrap">
      <h2 class="results-title">النتائج</h2>
      <div id="results"></div>
      <button class="copy-btn" onclick="copyResults()">📋 نسخ النتائج</button>
      <div class="footer-note">إذا كان الوقت متطابقًا فلن يتم عرض تنبيه خاص بالوقت.</div>
    </div>
  </div>
</div>

<script>
function unique(arr){
  return [...new Set(arr)];
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function normalizeArabicDigits(str){
  const arabicNums = '٠١٢٣٤٥٦٧٨٩';
  const englishNums = '0123456789';
  return String(str).replace(/[٠-٩]/g, d => englishNums[arabicNums.indexOf(d)]);
}

function cleanText(str){
  return normalizeArabicDigits(str)
    .replace(/[\u200f\u200e]/g, '')
    .replace(/\r/g, '')
    .trim();
}

function parseArabicMeridiem(value){
  value = cleanText(value);
  if(value.includes('ص')) return 'AM';
  if(value.includes('م')) return 'PM';
  return null;
}

function parseTimeToMinutes(hour, minute, meridiem){
  hour = parseInt(hour, 10);
  minute = parseInt(minute, 10);

  if(isNaN(hour) || isNaN(minute) || !meridiem) return null;

  if(hour === 12){
    hour = (meridiem === 'AM') ? 0 : 12;
  } else if(meridiem === 'PM'){
    hour += 12;
  }

  return hour * 60 + minute;
}

function minutesToArabicTime(totalMinutes){
  if(totalMinutes == null || isNaN(totalMinutes)) return 'غير معروف';

  let hour24 = Math.floor(totalMinutes / 60) % 24;
  let minute = totalMinutes % 60;

  let meridiem = hour24 >= 12 ? 'م' : 'ص';
  let hour12 = hour24 % 12;
  if(hour12 === 0) hour12 = 12;

  return `${hour12}:${String(minute).padStart(2,'0')} ${meridiem}`;
}

function formatRange(range){
  if(!range) return 'لم يتم العثور على الوقت';
  return `${minutesToArabicTime(range.start)} → ${minutesToArabicTime(range.end)}`;
}

function extractSupervisorTime(text){
  const t = cleanText(text).replace(/\s+/g, ' ');

  const regex = /من\s*الساعة\s*\(?\s*(\d{1,2})\s*:\s*(\d{2})\s*([صم])\s*\)?\s*الى\s*الساعة\s*\(?\s*(\d{1,2})\s*:\s*(\d{2})\s*([صم])\s*\)?/i;
  const match = t.match(regex);

  if(!match) return null;

  return {
    start: parseTimeToMinutes(match[1], match[2], parseArabicMeridiem(match[3])),
    end: parseTimeToMinutes(match[4], match[5], parseArabicMeridiem(match[6])),
    raw: match[0]
  };
}

function extractTechnicalTime(text){
  const t = cleanText(text).replace(/\s+/g, ' ');

  const regex = /من\s*الساعه\s*\(?\s*(\d{1,2})\s*:\s*(\d{2})\s*\)?\s*\(?\s*([صم])\s*\)?\s*حتى\s*الساعه\s*\(?\s*(\d{1,2})\s*:\s*(\d{2})\s*\)?\s*\(?\s*([صم])\s*\)?/i;
  const match = t.match(regex);

  if(!match) return null;

  return {
    start: parseTimeToMinutes(match[1], match[2], parseArabicMeridiem(match[3])),
    end: parseTimeToMinutes(match[4], match[5], parseArabicMeridiem(match[6])),
    raw: match[0]
  };
}

function validateTimeRange(label, range){
  if(!range){
    return {
      valid:false,
      message:`لم يتم العثور على وقت ${label}.`
    };
  }

  if(range.start == null || range.end == null){
    return {
      valid:false,
      message:`تعذر قراءة وقت ${label} بشكل صحيح.`
    };
  }

  if(range.end <= range.start){
    return {
      valid:false,
      message:`وقت ${label} غير صحيح: النهاية ليست بعد البداية.`
    };
  }

  return {
    valid:true,
    message:`وقت ${label} صحيح مبدئيًا.`
  };
}

function checkTimeMatch(supervisorRange, technicalRange){
  if(!supervisorRange || !technicalRange){
    return {
      ok:false,
      silent:false,
      message:'تعذر التحقق من تطابق الوقت لأن أحد التقريرين لا يحتوي على وقت واضح.'
    };
  }

  if(supervisorRange.end === technicalRange.start){
    return {
      ok:true,
      silent:true,
      message:''
    };
  }

  return {
    ok:false,
    silent:false,
    message:`الوقت غير متطابق: نهاية تقرير المشرف هي ${minutesToArabicTime(supervisorRange.end)} بينما بداية تقرير الفني هي ${minutesToArabicTime(technicalRange.start)}.`
  };
}

function cleanupLine(line){
  return cleanText(line)
    .replace(/\*+/g, '')
    .replace(/`+/g, '')
    .replace(/ـ+/g, '')
    .replace(/[()]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function looksLikeDivider(line){
  return /^[\-\—\_ـ\s]+$/.test(line);
}

function detectSectionLabel(line, currentSection){
  const raw = cleanupLine(line);
  if(!raw || looksLikeDivider(raw)) return currentSection;

  const lineWithoutMentions = raw.replace(/<@\d+>/g, '').trim();
  const lineWithoutCodes = lineWithoutMentions.replace(/\b[A-Z]+-\d+\b/g, '').trim();

  const colonMatch = lineWithoutCodes.match(/^(.{1,80}?)\s*[:：]\s*(.*)$/);
  if(colonMatch){
    const label = colonMatch[1].trim();
    if(label) return label;
  }

  const isShortHeading =
    !raw.includes('<@') &&
    !/\b[A-Z]+-\d+\b/.test(raw) &&
    raw.length <= 35;

  if(isShortHeading){
    return raw;
  }

  return currentSection || 'غير محدد';
}

function analyzeReport(text){
  const lines = cleanText(text).split('\n');
  let currentSection = 'غير محدد';

  const mentionMap = {};
  const codeMap = {};
  const invalidCodes = [];

  const mentionRegex = /<@\d+>/g;
  const allCodeRegex = /\b[A-Z]+-\d+\b/g;

  for(const originalLine of lines){
    const line = originalLine.trim();
    if(!line) continue;

    currentSection = detectSectionLabel(line, currentSection);
    const place = currentSection || 'غير محدد';

    const mentions = line.match(mentionRegex) || [];
    const allCodes = line.match(allCodeRegex) || [];

    mentions.forEach(m => {
      if(!mentionMap[m]) mentionMap[m] = [];
      mentionMap[m].push(place);
    });

    allCodes.forEach(code => {
      if(/^G-\d{3,}$/i.test(code)){
        if(!codeMap[code]) codeMap[code] = [];
        codeMap[code].push(place);
      } else {
        invalidCodes.push({ code, place });
      }
    });
  }

  return {
    mentionMap,
    codeMap,
    invalidCodes
  };
}

function uniquePlaces(arr){
  return unique((arr || []).map(x => cleanupLine(x)).filter(Boolean));
}

function buildOnlyItems(map, titlePrefix){
  const items = Object.entries(map);
  if(!items.length) return '<div class="empty">لا يوجد</div>';

  return `
    <ul>
      ${items.map(([key, places]) => `
        <li>
          <span class="code-like">${escapeHtml(key)}</span>
          — ${escapeHtml(titlePrefix)}
          <span class="place">${escapeHtml(uniquePlaces(places).join(' / '))}</span>
        </li>
      `).join('')}
    </ul>
  `;
}

function buildDuplicateItems(map, reportName){
  const duplicatedEntries = Object.entries(map)
    .filter(([, places]) => (places || []).length > 1);

  if(!duplicatedEntries.length) return '<div class="empty">لا يوجد</div>';

  return `
    <ul>
      ${duplicatedEntries.map(([key, places]) => `
        <li>
          <span class="code-like">${escapeHtml(key)}</span>
          — مكرر في ${escapeHtml(reportName)}
          <span class="place">${escapeHtml(uniquePlaces(places).join(' / '))}</span>
          <div class="badge">عدد التكرارات: ${places.length}</div>
        </li>
      `).join('')}
    </ul>
  `;
}

function buildInvalidCodeItems(items, reportName){
  if(!items.length) return '<div class="empty">لا يوجد</div>';

  return `
    <ul>
      ${items.map(item => `
        <li>
          <span class="code-like">${escapeHtml(item.code)}</span>
          — كود غير صحيح في ${escapeHtml(reportName)}
          <span class="place">${escapeHtml(item.place)}</span>
        </li>
      `).join('')}
    </ul>
  `;
}

function buildSharedItems(sharedMentions){
  if(!sharedMentions.length) return '<div class="empty">لا يوجد</div>';
  return `<ul>${sharedMentions.map(m => `<li><span class="code-like">${escapeHtml(m)}</span></li>`).join('')}</ul>`;
}

function compareReports(){
  const supText = document.getElementById('supervisorText').value || '';
  const techText = document.getElementById('technicalText').value || '';

  const supervisor = analyzeReport(supText);
  const technical = analyzeReport(techText);

  const supMentions = Object.keys(supervisor.mentionMap);
  const techMentions = Object.keys(technical.mentionMap);

  const sharedMentions = supMentions.filter(m => techMentions.includes(m));
  const onlySupervisorMap = {};
  const onlyTechnicalMap = {};

  supMentions.forEach(m => {
    if(!techMentions.includes(m)){
      onlySupervisorMap[m] = supervisor.mentionMap[m];
    }
  });

  techMentions.forEach(m => {
    if(!supMentions.includes(m)){
      onlyTechnicalMap[m] = technical.mentionMap[m];
    }
  });

  const supervisorTime = extractSupervisorTime(supText);
  const technicalTime = extractTechnicalTime(techText);

  const supervisorTimeCheck = validateTimeRange('تقرير المشرف', supervisorTime);
  const technicalTimeCheck = validateTimeRange('تقرير الفني', technicalTime);
  const timeMatchCheck = checkTimeMatch(supervisorTime, technicalTime);

  const timeParts = [];

  if(!supervisorTimeCheck.valid){
    timeParts.push(`
      <div class="time-bad" style="margin-top:8px;">
        ${escapeHtml(supervisorTimeCheck.message)}
      </div>
    `);
  }

  if(!technicalTimeCheck.valid){
    timeParts.push(`
      <div class="time-bad" style="margin-top:8px;">
        ${escapeHtml(technicalTimeCheck.message)}
      </div>
    `);
  }

  if(supervisorTimeCheck.valid && technicalTimeCheck.valid && !timeMatchCheck.silent){
    timeParts.push(`
      <div class="time-bad" style="margin-top:8px;">
        ${escapeHtml(timeMatchCheck.message)}
      </div>
    `);
  }

  const timeHTML = timeParts.length ? `
    <div class="result-box time-box">
      <h3>⏰ التحقق من الوقت</h3>
      <div class="time-info"><strong>وقت تقرير المشرف:</strong> <span class="code-like">${escapeHtml(formatRange(supervisorTime))}</span></div>
      <div class="time-info" style="margin-top:10px;"><strong>وقت تقرير الفني:</strong> <span class="code-like">${escapeHtml(formatRange(technicalTime))}</span></div>
      ${timeParts.join('')}
    </div>
  ` : '';

  const resultsHTML = `
    ${timeHTML}

    <div class="result-box shared">
      <h3>✅ المنشنات المشتركة</h3>
      ${buildSharedItems(sharedMentions)}
    </div>

    <div class="result-box only-supervisor">
      <h3>❌ منشنات موجودة في تقرير المشرف فقط</h3>
      ${buildOnlyItems(onlySupervisorMap, 'موجود فقط في تقرير المشرف عند')}
    </div>

    <div class="result-box only-technical">
      <h3>❌ منشنات موجودة في تقرير الفني فقط</h3>
      ${buildOnlyItems(onlyTechnicalMap, 'موجود فقط في تقرير الفني عند')}
    </div>

    <div class="result-box duplicate">
      <h3>🔁 منشنات مكررة في تقرير المشرف</h3>
      ${buildDuplicateItems(supervisor.mentionMap, 'تقرير المشرف')}
    </div>

    <div class="result-box duplicate">
      <h3>🔁 منشنات مكررة في تقرير الفني</h3>
      ${buildDuplicateItems(technical.mentionMap, 'تقرير الفني')}
    </div>

    <div class="result-box duplicate">
      <h3>🔵 الأكواد المكررة في تقرير المشرف</h3>
      ${buildDuplicateItems(supervisor.codeMap, 'تقرير المشرف')}
    </div>

    <div class="result-box duplicate">
      <h3>🔵 الأكواد المكررة في تقرير الفني</h3>
      ${buildDuplicateItems(technical.codeMap, 'تقرير الفني')}
    </div>

    <div class="result-box invalid">
      <h3>⚠️ الأكواد الخاطئة في تقرير المشرف</h3>
      ${buildInvalidCodeItems(supervisor.invalidCodes, 'تقرير المشرف')}
    </div>

    <div class="result-box invalid">
      <h3>⚠️ الأكواد الخاطئة في تقرير الفني</h3>
      ${buildInvalidCodeItems(technical.invalidCodes, 'تقرير الفني')}
    </div>
  `;

  document.getElementById('results').innerHTML = resultsHTML;
}

function clearAllFields(){
  document.getElementById('supervisorText').value = '';
  document.getElementById('technicalText').value = '';
  document.getElementById('results').innerHTML = '';
}

function copyResults(){
  const results = document.getElementById('results').innerText.trim();
  if(!results){
    alert('لا توجد نتائج لنسخها.');
    return;
  }

  navigator.clipboard.writeText(results)
    .then(() => alert('تم نسخ النتائج.'))
    .catch(() => alert('تعذر نسخ النتائج.'));
}
</script>

</body>
</html>
